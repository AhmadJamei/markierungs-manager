{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="col-6">
        <h2>Login Form</h2>

        <form method="post">
            {% csrf_token %}
            {{ form | crispy}}
            <br>
            <button type="submit" class="btn btn-success">Login</button>
            <p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
        </form>
    </div>
</div>
{% endblock %}
